function renderPatternEdit(n) {
  const isNew = !nodeById(n.id);
  const linkedDims = new Set(dimensionsOf(n.id));
  if (n.dimension && !linkedDims.size) linkedDims.add(n.dimension); // fallback legado
  const dimChecks = DIMENSIONS.map(d => `
    <label style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;margin:2px;background:var(--surface-2);cursor:pointer;border-radius:100px;font-size:11px">
      <input type="checkbox" data-dim="${d.id}" ${linkedDims.has(d.id)?'checked':''}>
      <span style="width:10px;height:10px;border-radius:50%;background:${d.color};display:inline-block"></span>
      ${escapeHtml(d.label)}
    </label>
  `).join('');
  const obsHtml = (n.observations || []).map((o, i) => obsFormHtml(o, i)).join('');
  const questionsHtml = (n.questions || []).map((item, i) => questionFormHtml(item, i)).join('');

  modalContent.innerHTML = `
    <h2>${isNew ? 'Novo card' : 'Editar: ' + escapeHtml(n.title)}</h2>
    <div class="modal-subtitle">Preencha os campos. Quanto mais específico, mais útil para a psicóloga.</div>
    <div class="form-group">
      <label>Título</label>
      <input type="text" id="f-title" value="${escapeHtml(n.title)}">
    </div>
    <div class="form-group">
      <label>Dimensões (pode marcar mais de uma)</label>
      <div id="dim-checks" style="background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:8px">${dimChecks}</div>
    </div>
    <div class="form-group">
      <label>Resumo / descrição</label>
      <textarea id="f-summary" rows="4" style="width:100%;resize:vertical">${escapeHtml(n.summary || '')}</textarea>
    </div>
    <div class="form-group">
      <label>Perguntas reflexivas</label>
      <div id="q-list">${questionsHtml}</div>
      <button id="btnAddQuestion" style="margin-top:6px;font-family:var(--font-sans);font-size:11px;padding:6px 12px;background:transparent;border:1px dashed var(--line-strong);color:var(--text-dim);cursor:pointer;border-radius:100px">+ Adicionar pergunta</button>
    </div>
    <div class="form-group">
      <label>Observações</label>
      <div id="obs-list">${obsHtml}</div>
      <button id="btnAddObs" style="margin-top:6px;font-family:var(--font-sans);font-size:11px;padding:6px 12px;background:transparent;border:1px dashed var(--line-strong);color:var(--text-dim);cursor:pointer;border-radius:100px">+ Adicionar observação</button>
    </div>
    <div class="modal-actions">
      <button id="btnSaveCard" style="background:var(--accent-dim);color:var(--accent);border-color:var(--accent)">💾 Salvar</button>
      <button id="btnCancel">Cancelar</button>
    </div>
  `;

  document.getElementById('btnAddObs').onclick = () => {
    n.observations = n.observations || [];
    n.observations.push({ text:'', intensity:3, frequency:'situacional', since:'', example:'' });
    renderModalEdit(n);
  };
  document.querySelectorAll('.remove-obs').forEach(b => {
    b.onclick = () => {
      const idx = +b.dataset.idx;
      n.observations.splice(idx, 1);
      renderModalEdit(n);
    };
  });

  // Captura o que está nos inputs de pergunta antes de re-renderizar (não perde digitação)
  function syncQuestionsFromForm() {
    n.questions = (n.questions || []).map((item, i) => ({
      q: document.querySelector(`[data-q-text="${i}"]`)?.value ?? item.q,
      a: document.querySelector(`[data-q-ans="${i}"]`)?.value ?? item.a
    }));
  }
  document.getElementById('btnAddQuestion').onclick = () => {
    syncQuestionsFromForm();
    n.questions = n.questions || [];
    n.questions.push({ q:'', a:'' });
    renderModalEdit(n);
  };
  document.querySelectorAll('.remove-q').forEach(b => {
    b.onclick = () => {
      syncQuestionsFromForm();
      n.questions.splice(+b.dataset.idx, 1);
      renderModalEdit(n);
    };
  });
  document.getElementById('btnSaveCard').onclick = () => {
    n.title = document.getElementById('f-title').value.trim() || 'Sem título';
    const selectedDims = Array.from(document.querySelectorAll('#dim-checks input:checked')).map(i => i.dataset.dim);
    n.dimension = selectedDims[0] || ''; // primária (fallback)
    n.summary = document.getElementById('f-summary').value.trim();
    n.observations = (n.observations || []).map((o, i) => ({
      text: document.querySelector(`[data-obs-text="${i}"]`)?.value.trim() || '',
      intensity: +(document.querySelector(`[data-obs-int="${i}"]`)?.value || 3),
      frequency: document.querySelector(`[data-obs-freq="${i}"]`)?.value || 'situacional',
      valence: document.querySelector(`[data-obs-val="${i}"]`)?.value || '',
      since: document.querySelector(`[data-obs-since="${i}"]`)?.value.trim() || ''
    })).filter(o => o.text);
    n.questions = (n.questions || []).map((item, i) => ({
      q: (document.querySelector(`[data-q-text="${i}"]`)?.value || '').trim(),
      a: (document.querySelector(`[data-q-ans="${i}"]`)?.value || '').trim()
    })).filter(x => x.q || x.a);
    if (isNew) state.nodes.push(n);

    // garante que existam cards de dimensão pra todas selecionadas
    selectedDims.forEach(dimId => {
      if (!nodeById('dim-' + dimId)) {
        const pos = dimensionPositions().find(p => p.dimId === dimId);
        const dim = DIMENSIONS.find(x => x.id === dimId);
        state.nodes.push({
          id: pos.id, kind: 'dimension', title: dim.label,
          dimension: dimId, x: pos.x, y: pos.y, rotation: 0
        });
      }
    });

    // sincroniza conexões padrão↔dimensão (remove antigas e cria as selecionadas)
    state.connections = state.connections.filter(c => {
      const other = c.from === n.id ? c.to : (c.to === n.id ? c.from : null);
      if (!other) return true;
      const otherNode = nodeById(other);
      return !(otherNode && otherNode.kind === 'dimension');
    });
    selectedDims.forEach(dimId => {
      state.connections.push({ from: n.id, to: 'dim-' + dimId, type: 'dimension' });
    });

    saveState();
    renderCards();
    renderStrings();
    renderModalView(n);
    showBanner('Salvo');
  };
  document.getElementById('btnCancel').onclick = () => {
    if (isNew) closeModal();
    else renderModalView(nodeById(n.id));
  };
}

function obsFormHtml(o, i) {
  const freqOptions = FREQUENCIES.map(f => `<option ${o.frequency===f?'selected':''}>${f}</option>`).join('');
  const intOptions = [0,1,2,3,4,5].map(v => `<option value="${v}" ${o.intensity===v?'selected':''}>${v===0?'não se aplica':v+'/5'}</option>`).join('');
  const valenceOptions = ['','positivo','neutro','negativo'].map(v => `<option value="${v}" ${(o.valence||'')===v?'selected':''}>${v||'—'}</option>`).join('');
  return `
    <div class="obs-form">
      <input type="text" data-obs-text="${i}" placeholder="Observação..." value="${escapeHtml(o.text)}">
      <div class="row">
        <div><label style="font-size:10px">Quão presente</label>
          <select data-obs-int="${i}">${intOptions}</select></div>
        <div><label style="font-size:10px">Frequência</label>
          <select data-obs-freq="${i}">${freqOptions}</select></div>
        <div><label style="font-size:10px">Sinal</label>
          <select data-obs-val="${i}">${valenceOptions}</select></div>
      </div>
      <div class="row">
        <div><label style="font-size:10px">Desde quando</label>
          <input type="text" data-obs-since="${i}" placeholder="infância, adolescência..." value="${escapeHtml(o.since||'')}"></div>
      </div>
      <button class="remove-obs" data-idx="${i}">Remover observação</button>
    </div>
  `;
}

function questionFormHtml(item, i) {
  return `
    <div class="obs-form q-form">
      <input type="text" data-q-text="${i}" placeholder="Pergunta..." value="${escapeHtml(item.q || '')}">
      <textarea data-q-ans="${i}" rows="2" placeholder="Resposta..." style="width:100%;resize:vertical;margin-top:4px">${escapeHtml(item.a || '')}</textarea>

  `;

  document.getElementById('btnSaveCard').onclick = () => {
    n.title = document.getElementById('f-title').value.trim() || 'Episódio sem título';
    n.dimension = document.getElementById('f-dimension').value;
    n.fact = {
      date: document.getElementById('f-date').value.trim(),
      text: document.getElementById('f-text').value.trim(),
      trigger: document.getElementById('f-trigger').value.trim(),
      body: document.getElementById('f-body').value.trim(),
      helped: document.getElementById('f-helped').value.trim(),
      intensity: +document.getElementById('f-intensity').value,
      frequency: document.getElementById('f-frequency').value,
      valence: document.getElementById('f-valence').value
    };
    const checks = Array.from(document.querySelectorAll('#pattern-checks input:checked')).map(i => i.value);
    if (isNew) {
      state.nodes.push(n);
      delete n._linkTo;
    }
    // sincroniza conexões a padrões
    state.connections = (state.connections||[]).filter(c => {
      if (c.from === n.id || c.to === n.id) {
        const other = c.from === n.id ? c.to : c.from;
        const otherNode = nodeById(other);
        if (otherNode && otherNode.kind !== 'fact') return false; // remove pra recriar
      }
      return true;
    });
    checks.forEach(pid => {
      state.connections.push({ from: n.id, to: pid, type: 'evidence' });
    });
    saveState();
    renderCards();
    renderStrings();
    renderFactModalView(n);
    showBanner('Episódio salvo');
  };
  document.getElementById('btnCancel').onclick = () => {
    if (isNew) closeModal();
    else renderFactModalView(nodeById(n.id));

// ============================================================
// CARREGAR DADOS PROTEGIDOS (.enc)
// Descriptografia local, sem rede além do fetch do próprio .enc.
// Mesma lógica do criptogramos.html:
//   formato: [ salt 16B | IV 12B | ciphertext ]
//   plaintext interno: [ nameLen 4B BE | nome UTF-8 | conteúdo ]
//   PBKDF2-SHA-512 210.000 iter → AES-256-GCM
// ============================================================
const PROTECTED_FILE = './mapa-mental.json.enc';
const PBKDF2_ITERATIONS = 210000;
const SALT_BYTES = 16;
const IV_BYTES = 12;

// Deriva a chave AES-GCM a partir da senha (PBKDF2-SHA-512). usage: 'encrypt' ou 'decrypt'.
async function deriveProtectedKey(password, salt, usage = 'decrypt') {
  const baseKey = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password),
    { name: 'PBKDF2' }, false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: PBKDF2_ITERATIONS, hash: 'SHA-512' },
    baseKey, { name: 'AES-GCM', length: 256 }, false, [usage]
  );
}

async function decryptProtected(encBuffer, password) {
  const data = new Uint8Array(encBuffer);
  if (data.length < SALT_BYTES + IV_BYTES + 16) throw new Error('CORRUPT');
  const salt = data.subarray(0, SALT_BYTES);
  const iv = data.subarray(SALT_BYTES, SALT_BYTES + IV_BYTES);
  const ciphertext = data.subarray(SALT_BYTES + IV_BYTES);
  const key = await deriveProtectedKey(password, salt);
  let plainBuf;
  try {
    plainBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
  } catch (e) { throw new Error('AUTH'); }
  const bytes = new Uint8Array(plainBuf);
  if (bytes.length < 4) throw new Error('CORRUPT');
  const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
  const nameLen = view.getUint32(0, false);
  if (nameLen > bytes.length - 4) throw new Error('CORRUPT');
  const content = bytes.subarray(4 + nameLen);
  return new TextDecoder().decode(content);
}

// ============================================================
// EXPORTAR / PUBLICAR PROTEGIDO (.enc)
// Cifra o state localmente (mesmo formato do criptogramos.html) e:
//   (a) baixa o .enc, ou
//   (b) commita o .enc direto no GitHub via Contents API.
// A senha de criptografia nunca sai do navegador. O token do GitHub
// pode ser salvo (localStorage) por opção do usuário.
// ============================================================
const GH_OWNER = 'ni-moura';
const GH_REPO = 'psycho';
const GH_BRANCH = 'main';
const GH_PATH = 'mapa-mental.json.enc';
const SAVED_TOKEN_KEY = 'mapa-mental-gh-token';
const SAVED_PW_KEY = 'mapa-mental-enc-pw';
const PROTECTED_NAME = 'mapa-mental.json'; // nome lógico embutido no plaintext

function getSaved(key) { try { return localStorage.getItem(key) || ''; } catch(e) { return ''; } }
function setSaved(key, val) { try { localStorage.setItem(key, val); } catch(e) {} }
function clearSaved(key) { try { localStorage.removeItem(key); } catch(e) {} }

// Cifra o state -> ArrayBuffer [ salt 16B | iv 12B | ciphertext ]
async function encryptProtected(stateObj, password) {
  const jsonText = JSON.stringify(stateObj, null, 2);
  const contentBytes = new TextEncoder().encode(jsonText);
  const nameBytes = new TextEncoder().encode(PROTECTED_NAME);

  // plaintext interno: [ nameLen 4B BE | nome UTF-8 | conteúdo ]
  const plaintext = new Uint8Array(4 + nameBytes.length + contentBytes.length);
  const pv = new DataView(plaintext.buffer);
  pv.setUint32(0, nameBytes.length, false);
  plaintext.set(nameBytes, 4);
  plaintext.set(contentBytes, 4 + nameBytes.length);

  const salt = crypto.getRandomValues(new Uint8Array(SALT_BYTES));
  const iv = crypto.getRandomValues(new Uint8Array(IV_BYTES));
  const key = await deriveProtectedKey(password, salt, 'encrypt');
  const cipherBuf = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, plaintext);
  const ciphertext = new Uint8Array(cipherBuf);

  const out = new Uint8Array(SALT_BYTES + IV_BYTES + ciphertext.length);
  out.set(salt, 0);
  out.set(iv, SALT_BYTES);
  out.set(ciphertext, SALT_BYTES + IV_BYTES);
  return out.buffer;
}

function arrayBufferToBase64(buffer) {
  const bytes = new Uint8Array(buffer);
  let binary = '';
  const chunk = 0x8000; // evita estouro de fromCharCode com arrays grandes
  for (let i = 0; i < bytes.length; i += chunk) {
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
  }
  return btoa(binary);
}

function triggerEncDownload(buffer, filename) {
  const blob = new Blob([buffer], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

async function publishToGitHub(encBuffer, token) {
  const apiBase = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}`;
  const headers = {
    'Authorization': 'Bearer ' + token,
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28'
  };

  // 1) Buscar sha atual (necessário para sobrescrever); 404 = arquivo não existe
  let sha = undefined;
  const getResp = await fetch(`${apiBase}?ref=${GH_BRANCH}`, { headers, cache: 'no-store' });
  if (getResp.status === 401 || getResp.status === 403) throw new Error('AUTH');
  if (getResp.ok) {
    const meta = await getResp.json();
    sha = meta.sha;
  } else if (getResp.status !== 404) {
    throw new Error('GET');
  }

  // 2) PUT com o conteúdo cifrado em base64
  const body = {
    message: 'data: update mapa-mental (via index)',
    content: arrayBufferToBase64(encBuffer),
    branch: GH_BRANCH
  };
  if (sha) body.sha = sha;

  const putResp = await fetch(apiBase, { method: 'PUT', headers, body: JSON.stringify(body) });
  if (putResp.status === 401 || putResp.status === 403) throw new Error('AUTH');
  if (putResp.status === 409) throw new Error('CONFLICT');
  if (!(putResp.status === 200 || putResp.status === 201)) {
    let detail = '';
    try { detail = (await putResp.json()).message || ''; } catch(e) {}
    throw new Error('PUT' + (detail ? ': ' + detail : ''));
  }
}

// ============================================================
// DATE PARSING (tolerante)
// ============================================================
function parseDateStr(s) {
  if (!s) return null;
  const t = s.trim().toLowerCase();
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if (t === 'hoje') return today;
  if (t === 'ontem') return new Date(today.getTime() - 24*3600*1000);
  if (t === 'anteontem') return new Date(today.getTime() - 2*24*3600*1000);
  // ISO yyyy-mm-dd ou yyyy/mm/dd
  const iso = t.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
  if (iso) return new Date(+iso[1], +iso[2]-1, +iso[3]);
  // dd/mm/yyyy
  const br = t.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (br) return new Date(+br[3], +br[2]-1, +br[1]);
  // dd/mm (assume ano atual)
  const brShort = t.match(/^(\d{1,2})\/(\d{1,2})$/);
  if (brShort) return new Date(now.getFullYear(), +brShort[2]-1, +brShort[1]);
  const parsed = Date.parse(s);
  if (!isNaN(parsed)) return new Date(parsed);
  return null;
}

// Popula o seletor de categoria com as dimensões em uso pelos episódios.
function populateTimelineDimSelect() {
  const used = new Set();
  state.nodes.filter(n => isDatedKind(n) && n.dimension).forEach(n => used.add(n.dimension));
  const current = view.timelineDim || '';
  let opts = '<option value="">Todas</option>';
  DIMENSIONS.filter(d => used.has(d.id)).forEach(d => {
    opts += `<option value="${d.id}" ${current === d.id ? 'selected' : ''}>${escapeHtml(d.label)}</option>`;
  });
  timelineDimSel.innerHTML = opts;
  if (![...used].includes(current)) view.timelineDim = ''; // dimensão filtrada sumiu
}

function openTimeline() {
  timelineView.classList.add('active');

  renderTimeline();
}
function closeTimeline() { timelineView.classList.remove('active'); }

// Renderiza um cartão de episódio (reusado nos modos por-dia e por-categoria).
function timelineEntryHtml(f) {
  const linked = patternsLinkedTo(f.id);
  return `
    <div class="timeline-entry" data-id="${f.id}">
      <div class="te-date">${escapeHtml(f.fact?.date || '')}</div>
      <div class="te-title">${escapeHtml(f.title)}</div>
      ${f.fact?.text ? `<div class="te-text">${escapeHtml(f.fact.text)}</div>` : ''}
      <div class="te-meta">
        ${f.fact?.intensity ? `<span>★ ${f.fact.intensity}/5</span>` : ''}
        ${f.fact?.frequency ? `<span>${escapeHtml(f.fact.frequency)}</span>` : ''}
        ${f.fact?.trigger ? `<span>gatilho ✓</span>` : ''}
        ${f.fact?.body ? `<span>corpo ✓</span>` : ''}
        ${f.fact?.helped ? `<span>ajudou ✓</span>` : ''}
      </div>
      ${linked.length ? `<div class="te-patterns">→ ${linked.map(p => escapeHtml(p.title)).join(' · ')}</div>` : ''}
    </div>
  `;
}

function renderTimeline() {
  const filter = view.timelineFilter || 'week';
  const groupBy = view.timelineGroup || 'day';
  const dimFilter = view.timelineDim || '';
  const now = new Date();
  let cutoff = null;
  if (filter === 'week') cutoff = new Date(now.getTime() - 7*24*3600*1000);
  else if (filter === 'month') cutoff = new Date(now.getTime() - 30*24*3600*1000);

  const facts = state.nodes.filter(n => isDatedKind(n));
  const withDates = facts.map(f => ({ f, d: parseDateStr(f.fact?.date) || new Date(0) }))
    .filter(x => !cutoff || x.d >= cutoff)
    .filter(x => !dimFilter || x.f.dimension === dimFilter)
    .sort((a,b) => b.d - a.d);

  if (!withDates.length) {
    timelineList.innerHTML = `<div class="timeline-empty">Nenhum episódio nesse período${dimFilter ? ' nessa categoria' : ''}.<br><br>Clique em "+ Registrar agora" no banner do topo, ou pressione <b>N</b>.</div>`;
    return;
  }

  let html = '';

  if (groupBy === 'dim') {
    // Agrupa por dimensão/categoria do episódio
    const groups = {};
    withDates.forEach(({f}) => {
      const key = f.dimension || '';
      if (!groups[key]) groups[key] = [];
      groups[key].push(f);
    });
    // ordena categorias por nº de episódios (desc)
    Object.entries(groups)
      .sort((a,b) => b[1].length - a[1].length)
      .forEach(([dimId, items]) => {
        const dim = dimId ? dimById(dimId) : null;
        const label = dim ? dim.label : 'Sem categoria';
        const color = dim ? dim.color : '#888';
        html += `<div class="timeline-dim-header" style="border-left-color:${color};color:${color}">${escapeHtml(label)} <span style="font-size:11px;color:#8aa">· ${items.length} episódio${items.length===1?'':'s'}</span></div>`;
        items.forEach(f => { html += timelineEntryHtml(f); });
      });
  } else {
    // Agrupa por dia
    const groups = {};
    withDates.forEach(({f, d}) => {
      const key = d.getTime() ? d.toDateString() : 'sem data';
      if (!groups[key]) groups[key] = { date: d, items: [] };
      groups[key].items.push(f);
    });
    Object.values(groups).forEach(g => {
      const dayLabel = g.date.getTime()
        ? g.date.toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'long', year:'numeric' })
        : 'sem data';
      html += `<div class="timeline-day-header">${escapeHtml(dayLabel)}</div>`;
      g.items.forEach(f => { html += timelineEntryHtml(f); });
    });
  }

  timelineList.innerHTML = html;

  document.querySelectorAll('.timeline-entry').forEach(el => {
    el.onclick = () => {
      const f = nodeById(el.dataset.id);
      if (f) {
        closeTimeline();
        renderModalView(f);
        modalBackdrop.classList.add('active');
      }
    };
  });
}

    if (modalBackdrop.classList.contains('active')) { closeModal(); return; }
    if (timelineView.classList.contains('active')) { closeTimeline(); return; }

  if (inField) {

      const saveBtn = document.getElementById('btnSaveCard');
      if (saveBtn) { e.preventDefault(); saveBtn.click(); }
    }
    return;

  if (e.key.toLowerCase() === 'n' && !e.ctrlKey && !e.metaKey && !e.altKey) {
    if (view.mode === 'read') return; // leitura: sem captura rápida de episódio
    if (modalBackdrop.classList.contains('active')) return;
    e.preventDefault();
    quickCaptureEpisode();
  }
});

// INIT — GATE DE SENHA OBRIGATÓRIO
// A senha valida e descriptografa o .enc. Após validar, se houver edições
// salvas localmente (localStorage), usamos elas — são as mais recentes e podem
// não ter sido publicadas ainda; senão usamos o conteúdo do .enc.
// ============================================================
let unlocked = false;

// Aplica o modo (read/edit) à UI: classe no body controla CSS de visibilidade.
function applyMode() {
  document.body.classList.toggle('read-mode', view.mode === 'read');
  const badge = document.getElementById('modeBadge');
  if (badge) {
    badge.textContent = view.mode === 'read' ? '👁 leitura · trocar' : '✏ edição · trocar';
    badge.title = view.mode === 'read'
      ? 'Modo leitura — clique para passar ao modo edição'
      : 'Modo edição — clique para passar ao modo leitura';
  }
}

// Alterna leitura <-> edição mantendo o que está na tela (sem recarregar estado).
function toggleMode() {
  view.mode = view.mode === 'read' ? 'edit' : 'read';
  applyMode();
  if (modalBackdrop.classList.contains('active')) closeModal(); // evita modal preso em modo antigo
  renderCards();
  renderStrings();
  showBanner(view.mode === 'read' ? 'Modo leitura' : 'Modo edição');
}

document.getElementById('modeBadge').addEventListener('click', toggleMode);

function unlockAndRender(encData, mode) {
  view.mode = (mode === 'read') ? 'read' : 'edit';
  // O login sempre carrega a versão publicada (.enc do GitHub), não o localStorage.
  state = migrateData(encData);
  state.nodes.forEach(n => { if (n.rotation === undefined) {
    let h = 0; for (let i = 0; i < n.id.length; i++) h = (h * 31 + n.id.charCodeAt(i)) | 0;
    n.rotation = ((Math.abs(h) % 80) / 10) - 4;
  }});
  unlocked = true;
  document.body.classList.remove('locked');
  applyMode();
  renderLegend();
  renderCards();
  renderStrings();
  applyTransform();
}

(function initGate() {
  const pwInput = document.getElementById('gate-pw');
  const errEl = document.getElementById('gate-error');
  const readBtn = document.getElementById('gate-read');
  const editBtn = document.getElementById('gate-edit');
  const rememberCb = document.getElementById('gate-remember');
  const eyeBtn = document.getElementById('gate-eye');
  const showErr = (msg) => { errEl.textContent = msg; errEl.style.display = 'block'; };

  // Ícones de olho (stroke = currentColor; herdam a cor do botão)
  const EYE_OPEN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>';
  const EYE_OFF = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18"/><path d="M10.6 6.2A9.6 9.6 0 0 1 12 5c6.5 0 10 7 10 7a17.6 17.6 0 0 1-3 3.8M6.3 6.5A17.4 17.4 0 0 0 2 12s3.5 7 10 7a9.4 9.4 0 0 0 4-.9"/><path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"/></svg>';
  eyeBtn.innerHTML = EYE_OPEN;

  eyeBtn.onclick = () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    eyeBtn.innerHTML = show ? EYE_OFF : EYE_OPEN;
    eyeBtn.setAttribute('aria-label', show ? 'Ocultar senha' : 'Mostrar senha');
    eyeBtn.title = show ? 'Ocultar senha' : 'Mostrar senha';
    pwInput.focus();
  };

  if (!window.isSecureContext || !(window.crypto && window.crypto.subtle)) {
    showErr('A descriptografia exige um contexto seguro (HTTPS ou localhost).');
    readBtn.disabled = true;
    editBtn.disabled = true;
    return;
  }
  // Pré-preenche se a senha foi lembrada antes (mesma chave do modal Publicar)
  const savedPw = getSaved(SAVED_PW_KEY);
  if (savedPw) { pwInput.value = savedPw; rememberCb.checked = true; }
  setTimeout(() => pwInput.focus(), 60);

  async function doUnlock(mode) {
    const password = pwInput.value;
    if (!password) { showErr('Digite a senha.'); return; }
    errEl.style.display = 'none';
    readBtn.disabled = true; editBtn.disabled = true;
    const activeBtn = mode === 'read' ? readBtn : editBtn;
    const origLabel = activeBtn.textContent;
    activeBtn.textContent = 'Descriptografando...';
    try {
      const resp = await fetch(PROTECTED_FILE, { cache: 'no-store' });
      if (!resp.ok) throw new Error('FETCH');
      const buffer = await resp.arrayBuffer();
      const jsonText = await decryptProtected(buffer, password);
      const data = JSON.parse(jsonText);
      if (!data || !data.nodes) throw new Error('CORRUPT');
      // senha correta: lembra ou esquece conforme o checkbox
      if (rememberCb.checked) setSaved(SAVED_PW_KEY, password); else clearSaved(SAVED_PW_KEY);
      unlockAndRender(data, mode);
    } catch (err) {
      readBtn.disabled = false; editBtn.disabled = false;
      activeBtn.textContent = origLabel;
      if (err.message === 'AUTH') showErr('Senha incorreta ou arquivo corrompido.');
      else if (err.message === 'FETCH') showErr('Não foi possível baixar o arquivo protegido.');
      else if (err.message === 'CORRUPT') showErr('Arquivo inválido ou corrompido.');
      else showErr('Erro inesperado ao descriptografar.');
      pwInput.select();
    }
  }

  readBtn.onclick = () => doUnlock('read');
  editBtn.onclick = () => doUnlock('edit');
  // Enter = modo edição (ação padrão para quem edita com frequência)
  pwInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doUnlock('edit'); });
})();

// auto-save antes de fechar — só persiste quando desbloqueado em modo EDIÇÃO
window.addEventListener('beforeunload', () => {
  if (!unlocked || view.mode !== 'edit') return;
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
});
